# ============================================================
# DeforestNet - Render.com Deployment Configuration
# ============================================================

services:
  - type: web
    name: deforestnet
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-render.txt
      mkdir -p data/synthetic data/raw data/processed models/checkpoints outputs/predictions outputs/visualizations outputs/benchmark database logs
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: FIREBASE_ENABLED
        value: false
      - key: DATABASE_PATH
        value: database/deforestnet.db
      - key: API_DEBUG
        value: false
    healthCheckPath: /api/health
    autoDeploy: true
